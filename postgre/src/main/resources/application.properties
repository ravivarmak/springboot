spring.application.name=postgre
# ==========================================
# DATABASE CONNECTION PROPERTIES
# ==========================================
# The JDBC URL format: jdbc:postgresql://[host]:[port]/[database_name]
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce
spring.datasource.username=postgres
spring.datasource.password=ravi
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE PROPERTIES
# ==========================================
# Automatically update the database schema based on your Entity classes
spring.jpa.hibernate.ddl-auto=update

# SQL Dialect allows Hibernate to generate optimized SQL for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show SQL queries in the console log (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

